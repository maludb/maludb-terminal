name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: scripts/package-release.sh --target "${{ matrix.target }}" --version "${{ needs.prepare.outputs.version }}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -Target "${{ matrix.target }}" -Version "${{ needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: maludb-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: guard
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not set; skipping Homebrew formula update."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          path: dist
          merge-multiple: true

      - name: Checkout tap
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: maludb/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        if: steps.guard.outputs.enabled == 'true'
        run: |
          scripts/update-homebrew-formula.sh \
            --version "${{ needs.prepare.outputs.version }}" \
            --dist-dir dist \
            --output tap/Formula/maludb.rb

      - name: Commit and push
        if: steps.guard.outputs.enabled == 'true'
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/maludb.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "maludb ${{ needs.prepare.outputs.version }}"
            git push
          fi
